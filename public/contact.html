<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | ZAID SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/src/index.css">    <style>
        /* CSS spécifique à la page contact */
        .contact-container {
            min-height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .contact-card {
            background-color: var(--white);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .contact-card i {
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: 20px;
        }
        .contact-info {
            margin: 25px 0;
            font-size: 1.1rem;
        }
        .contact-info p {
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .contact-info p i {
            font-size: 1.2rem;
            color: var(--primary-color);
            margin: 0;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <a href="index.html" style="text-decoration: none; color: inherit;">
                <i class="fa-solid fa-store"></i> ZAID <span>SHOP</span>
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html#accueil">Accueil</a></li>
            <li><a href="index.html#boutique">Boutique</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main class="contact-container">
        <div class="contact-card">
            <i class="fa-solid fa-headset"></i>
            <h2>Contactez-nous</h2>
            <p style="color: var(--text-light); margin-top: 10px;">Nous sommes à votre disposition pour toute question.</p>
            
            <div class="contact-info">
                <p><i class="fa-solid fa-user"></i> <strong>Direction :</strong> ZAID EL HOUWARI</p>
                <p><i class="fa-solid fa-envelope"></i> <strong>Email :</strong> zaidshop@gmail.com</p>
                <p><i class="fa-solid fa-phone"></i> <strong>Téléphone :</strong> 06 20 88 41 61</p>
                <p><i class="fa-solid fa-location-dot"></i> <strong>Siège :</strong> Chatou, Île-de-France</p>
            </div>
            
            <a href="index.html" class="btn-primary" style="display: inline-block; margin-top: 20px;">Retour à la boutique</a>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
